name: secure_stream_docs
description: "Secure Stream Docs"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  ## this for responsive
  flutter_screenutil: ^5.9.3

  ## this for routing
  go_router: ^17.2.2

  ## this for state management
  flutter_bloc: ^8.1.3

  ## compering objects
  equatable: ^2.0.7

  ## this for http requests
  dio: ^5.4.3+1

  ## this for video player
  better_player_plus: ^1.1.5

  ## this for pdf reader
  pdfrx: ^2.2.24

  ## this for local database
  isar_community: ^3.3.2

  ## this for isar core (contains native binaries)
  isar_community_flutter_libs: ^3.3.2

  ## this for state management
  bloc: ^8.1.4

  ## this for encryption
  encrypt: ^5.0.3

  ## this for functional error handling
  dartz: ^0.10.1

  ## this for dependency injection
  get_it: ^7.6.7

  ## this for connectivity checking
  internet_connection_checker_plus: ^2.1.0

  ## this for getting app directory
  path_provider: ^2.1.5

  ## this for generating unique ids
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  ## this for code generation
  build_runner: ^2.4.8

  ## this for routing
  go_router_builder: ^4.3.0

  ## this for flavors
  flutter_flavorizr: ^2.4.2

  ## this for icons
  flutter_launcher_icons: ^0.14.4

  ## this for splash screen
  flutter_native_splash: ^2.4.7

  ## this for isar code generation
  isar_community_generator: ^3.3.2

flavorizr:
  app:
    name: Secure Stream
  flavors:
    dev:
      app:
        name: "Secure Stream Dev"
      android:
        applicationId: "com.example.secure_stream_docs.dev"
      ios:
        bundleId: "com.example.secure_stream_docs.dev"
    stage:
      app:
        name: "Secure Stream Stage"
      android:
        applicationId: "com.example.secure_stream_docs.stage"
      ios:
        bundleId: "com.example.secure_stream_docs.stage"
    prod:
      app:
        name: "Secure Stream"
      android:
        applicationId: "com.example.secure_stream_docs"
      ios:
        bundleId: "com.example.secure_stream_docs"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#001B3D"
  image: assets/images/app_icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
